name: quran_knowledge_atlas
description: A Flutter app to explore the Quran verse by verse and discover the Quranic Knowledge Atlas.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # Navigation
  go_router: ^13.0.0

  # Visualizations
  graphview: ^1.2.0

  # Firebase Integration
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  firebase_analytics: ^12.4.2

  # Subscriptions and Ads
  purchases_flutter: ^10.2.3 # RevenueCat SDK
  google_mobile_ads: ^9.0.0  # AdMob Interstitials

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generators
  build_runner: ^2.4.8
  drift_dev: ^2.18.0
  riverpod_generator: ^2.3.9

  # Lints
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/entities.json
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Amiri Quran
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf
    - family: KFGQPC Uthmanic
      fonts:
        - asset: assets/fonts/Uthmanic-Regular.ttf
